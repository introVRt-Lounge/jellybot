name: Release Please

# Disabled for automatic runs: org policy blocks workflow PR creation.
# Semver releases are cut by scripts/create-release-if-needed.sh in ship-main.yml.
# Re-enable this workflow if workflow permissions are set to Read and write + allow PR creation.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          release-type: node
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
