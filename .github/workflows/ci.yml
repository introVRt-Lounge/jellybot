name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build test image
        run: docker compose --profile test build jellybot-tests

      - name: Run tests in container
        run: docker compose --profile test run --rm jellybot-tests

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Audit dependencies
        run: |
          bun install --frozen-lockfile
          bun audit

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.30.1 \
            dir /repo --redact --verbose

  owasp-sast:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.122.0
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep OWASP gate
        run: semgrep scan --config p/owasp-top-ten --config p/typescript --config p/javascript --config p/secrets --config security/semgrep/jellybot.yml --error

  ci:
    runs-on: ubuntu-latest
    needs: [test, security-audit, secret-scan, owasp-sast]
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.security-audit.result }}" = "success"
          test "${{ needs.secret-scan.result }}" = "success"
          test "${{ needs.owasp-sast.result }}" = "success"
