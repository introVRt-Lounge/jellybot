name: Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: jellybot-dev-smoke-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, jellybot-live]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Live smoke (dev bot + Jellyfin)
        env:
          JELLYBOT_ENV_FILE: /home/heavygee/coding/jellybot-dev/.env
          DISCORD_PY_SELF_ROOT: /home/heavygee/coding/discord.py-self
          JELLYBOT_SMOKE_HOST_PORT: "8094"
          JELLYBOT_SMOKE_HEALTH_URL: http://127.0.0.1:8094/healthz
          JELLYBOT_DATA_HOST_DIR: /home/heavygee/docker/jellybot/data
        run: bash scripts/smoke-ci.sh
