name: Docker Image

# Main-branch builds run via ship-main.yml (GITHUB_TOKEN merges do not emit push).
on:
  push:
    tags: ["v[0-9]+.[0-9]+.*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Evaluate whether tag is major/minor release
        id: release_scope
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" != "tag" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_TAG="${GITHUB_REF_NAME#v}"
          if [[ ! "$CURRENT_TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_major="${BASH_REMATCH[1]}"
          current_minor="${BASH_REMATCH[2]}"
          current_patch="${BASH_REMATCH[3]}"
          prev_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | sed -n '2p' || true)"
          if [[ -z "$prev_tag" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          prev_tag="${prev_tag#v}"
          if [[ ! "$prev_tag" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          prev_major="${BASH_REMATCH[1]}"
          prev_minor="${BASH_REMATCH[2]}"
          prev_patch="${BASH_REMATCH[3]}"

          if [[ "$current_major" -eq "$prev_major" && "$current_minor" -eq "$prev_minor" && "$current_patch" -gt "$prev_patch" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.release_scope.outputs.publish == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        if: steps.release_scope.outputs.publish == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.release_scope.outputs.publish == 'true'
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2e9
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) }}

      - name: Build and push runtime image
        if: steps.release_scope.outputs.publish == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}

      - name: Skip patch tag image publish
        if: steps.release_scope.outputs.publish != 'true'
        run: echo "Skipping image publish for patch tag ${GITHUB_REF_NAME}; only major/minor release tags move :latest for Watchtower."
