name: Cursor Issue Triage

on:
  issues:
    types:
      - labeled

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  trigger-cursor-agent:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      contains(fromJSON('["ai-triage","ai-safe"]'), github.event.label.name) &&
      (
        github.event.sender.login == 'radgey-cmd' ||
        contains(toJSON(github.event.issue.labels), 'discord-triage-blessed')
      )
    runs-on: ubuntu-latest

    concurrency:
      group: cursor-issue-triage-${{ github.repository }}-${{ github.event.issue.number }}
      cancel-in-progress: false

    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      REPOSITORY: ${{ github.repository }}
      BRANCH_NAME: ai-triage/fix-issue-${{ github.event.issue.number }}
      ENQUEUED_LABEL: ai-triage-enqueued

    steps:
      - name: Skip if already enqueued
        id: guard
        run: |
          set -euo pipefail
          labels="$(gh issue view "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --json labels -q '.labels[].name')"
          if echo "${labels}" | grep -Fxq "${ENQUEUED_LABEL}"; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "Issue already has ${ENQUEUED_LABEL}."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Start Cursor Cloud Agent
        id: agent
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          : "${CURSOR_API_KEY:?CURSOR_API_KEY secret is not set}"

          issue_json="$(gh api "/repos/${REPOSITORY}/issues/${ISSUE_NUMBER}")"
          title="$(echo "${issue_json}" | jq -r '.title')"
          body="$(echo "${issue_json}" | jq -r '.body // "(no body provided)"')"
          url="$(echo "${issue_json}" | jq -r '.html_url')"
          labels="$(echo "${issue_json}" | jq -r '[.labels[].name] | join(", ")')"

          prompt="$(jq -nr \
            --arg num "${ISSUE_NUMBER}" \
            --arg repo "${REPOSITORY}" \
            --arg title "${title}" \
            --arg body "${body}" \
            --arg url "${url}" \
            --arg labels "${labels}" \
            '[
              "# GitHub Issue #\($num)",
              "",
              "**Repository:** \($repo)",
              "**URL:** \($url)",
              "**Labels:** \($labels)",
              "",
              "## Title",
              $title,
              "",
              "## Description",
              $body,
              "",
              "---",
              "",
              "Implement the fix on branch ai-triage/fix-issue-\($num). Follow CONTRIBUTING.md. Open a PR whose description includes: Closes #\($num)",
              "",
              "## Critical - do not start the Discord bot",
              "",
              "Do NOT run bun run start, make dev-refresh, or any Docker profile that connects the Discord gateway.",
              "Do NOT use the production DISCORD_TOKEN. Run bun run ci for verification only.",
              "A second gateway connection breaks prod autocomplete (Interaction has already been acknowledged)."
            ] | join("\n")')"

          request_body="$(jq -n \
            --arg text "${prompt}" \
            --arg repo "https://github.com/${REPOSITORY}" \
            --arg branch "${BRANCH_NAME}" \
            '{prompt:{text:$text},source:{repository:$repo},target:{autoCreatePr:true,branchName:$branch}}')"

          auth_header="Authorization: Basic $(printf '%s' "${CURSOR_API_KEY}:" | base64 -w0)"

          response="$(curl -fsS -X POST "https://api.cursor.com/v0/agents" \
            -H "${auth_header}" \
            -H "Content-Type: application/json" \
            --data "${request_body}")"

          echo "${response}" | jq '.'
          agent_id="$(echo "${response}" | jq -r '.id // empty')"
          if [ -z "${agent_id}" ]; then
            echo "Cursor API did not return an agent id."
            exit 1
          fi
          echo "agent_id=${agent_id}" >> "${GITHUB_OUTPUT}"

      - name: Record pipeline agent id on issue
        if: steps.guard.outputs.skip != 'true'
        env:
          AGENT_ID: ${{ steps.agent.outputs.agent_id }}
        run: |
          set -euo pipefail
          agent_id="${AGENT_ID:-}"
          if [ -z "${agent_id}" ]; then
            echo "No agent id output; skipping pipeline comment."
            exit 0
          fi

          issue_state="$(gh issue view "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --json state -q '.state')"
          closed_note=""
          if [ "${issue_state}" = "CLOSED" ]; then
            closed_note=$'\n\n> ⚠️ **Pipeline warning:** This issue is already **closed**. Cursor may not open a PR until it is reopened.'
          fi

          body="$(cat <<EOF
          <!-- jellybot-pipeline-agent-id: ${agent_id} -->

          **Jellybot pipeline — agent started**

          | Field | Value |
          | --- | --- |
          | Cursor agent | [\`${agent_id}\`](https://cursor.com/agents?id=${agent_id}) |
          | Branch | \`${BRANCH_NAME}\` |
          | Enqueued | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |

          Track in Discord: \`/feature status issue:${ISSUE_NUMBER}\`${closed_note}
          EOF
          )"

          gh issue comment "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --body "${body}"

      - name: Notify Discord triage webhook
        if: steps.guard.outputs.skip != 'true'
        env:
          DISCORD_TRIAGE_WEBHOOK_URL: ${{ secrets.DISCORD_TRIAGE_DISPATCH_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_TRIAGE_WEBHOOK_URL}" ]; then
            echo "DISCORD_TRIAGE_DISPATCH_WEBHOOK_URL not set; skipping Discord notify."
            exit 0
          fi

          issue_json="$(gh api "/repos/${REPOSITORY}/issues/${ISSUE_NUMBER}")"
          title="$(echo "${issue_json}" | jq -r '.title')"
          url="$(echo "${issue_json}" | jq -r '.html_url')"
          link_label="#${ISSUE_NUMBER} ${title}"
          if [ "${#link_label}" -gt 120 ]; then
            link_label="#${ISSUE_NUMBER} ${title:0:117}..."
          fi

          payload="$(jq -n \
            --arg content "Uh oh... seems like [${link_label}](${url}) is under development... 👀" \
            '{content: $content}')"

          curl -fsS -X POST "${DISCORD_TRIAGE_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data "${payload}"

      - name: Mark issue enqueued
        if: steps.guard.outputs.skip != 'true'
        run: gh issue edit "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --add-label "${ENQUEUED_LABEL}"

      - name: Start conversation archive workflow
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          AGENT_ID: ${{ steps.agent.outputs.agent_id }}
        run: |
          set -euo pipefail
          if [ -z "${AGENT_ID}" ]; then
            echo "No agent id; skipping conversation archive."
            exit 0
          fi
          gh workflow run cursor-agent-conversation.yml \
            --repo "${REPOSITORY}" \
            -f "issue_number=${ISSUE_NUMBER}" \
            -f "agent_id=${AGENT_ID}" \
            -f "repository=${REPOSITORY}" \
            -f "skip_poll=false"
          echo "Started cursor-agent-conversation workflow for agent ${AGENT_ID} on issue #${ISSUE_NUMBER}."
