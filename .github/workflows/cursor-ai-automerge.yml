name: Cursor AI auto-merge

on:
  pull_request:
    types:
      - opened
      - labeled
      - synchronize
      - ready_for_review
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request'
      )
    runs-on: ubuntu-latest

    concurrency:
      group: cursor-ai-automerge-${{ github.event.pull_request.number || github.event.workflow_run.id }}
      cancel-in-progress: false

    steps:
      - name: Resolve pull request number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "${GITHUB_OUTPUT}"
          else
            number="$(gh api \
              "/repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
              --jq '.[0].number // empty')"
            if [ -z "${number}" ]; then
              echo "No pull request for workflow_run head commit."
              exit 0
            fi
            echo "number=${number}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Auto-merge eligible ai-safe agent PRs
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          pr_json="$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json \
            number,title,state,isDraft,mergeable,headRefName,body,labels,baseRefName)"

          state="$(echo "${pr_json}" | jq -r '.state')"
          if [ "${state}" != "OPEN" ]; then
            echo "PR #${PR_NUMBER} is ${state}; skipping."
            exit 0
          fi

          head_ref="$(echo "${pr_json}" | jq -r '.headRefName')"
          if ! [[ "${head_ref}" =~ ^ai-triage/ ]]; then
            echo "Head branch ${head_ref} is not an ai-triage agent branch; skipping."
            exit 0
          fi

          pr_has_ai_safe="$(echo "${pr_json}" | jq -r '[.labels[].name] | index("ai-safe") != null')"

          body="$(echo "${pr_json}" | jq -r '.body // ""')"
          issue_numbers="$(printf '%s' "${body}" \
            | grep -Eo '(Fixes|Closes|fixes|closes)[[:space:]]+#([0-9]+)' \
            | grep -Eo '[0-9]+' \
            | sort -u \
            || true)"

          if [ -z "${issue_numbers}" ]; then
            echo "PR #${PR_NUMBER} has no Fixes/Closes issue reference; skipping."
            exit 0
          fi

          issue_ai_safe=false
          blocked=false
          for issue_num in ${issue_numbers}; do
            labels="$(gh issue view "${issue_num}" --repo "${REPOSITORY}" --json labels -q '.labels[].name')"
            if echo "${labels}" | grep -Fxq "human-needed"; then
              blocked=true
              echo "Linked issue #${issue_num} has human-needed; skipping."
            fi
            if echo "${labels}" | grep -Fxq "ai-safe"; then
              issue_ai_safe=true
            fi
          done

          if [ "${blocked}" = "true" ]; then
            exit 0
          fi

          if [ "${pr_has_ai_safe}" != "true" ] && [ "${issue_ai_safe}" != "true" ]; then
            echo "Neither PR nor linked issue has ai-safe; skipping."
            exit 0
          fi

          if [ "${pr_has_ai_safe}" != "true" ] && [ "${issue_ai_safe}" = "true" ]; then
            echo "Copying ai-safe from linked issue to PR #${PR_NUMBER}."
            gh pr edit "${PR_NUMBER}" --repo "${REPOSITORY}" --add-label "ai-safe"
          fi

          is_draft="$(echo "${pr_json}" | jq -r '.isDraft')"
          if [ "${is_draft}" = "true" ]; then
            echo "Marking draft PR #${PR_NUMBER} ready for review."
            gh pr ready "${PR_NUMBER}" --repo "${REPOSITORY}"
          fi

          ci_conclusion="$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" \
            --json statusCheckRollup \
            -q '[.statusCheckRollup[] | select(.name == "ci") | .conclusion][0] // empty')"
          if [ "${ci_conclusion}" != "SUCCESS" ]; then
            echo "Required check ci is '${ci_conclusion:-pending}'; waiting for green CI."
            exit 0
          fi

          mergeable="$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json mergeable -q '.mergeable')"
          if [ "${mergeable}" != "MERGEABLE" ]; then
            echo "PR #${PR_NUMBER} is not mergeable (${mergeable}); skipping."
            exit 0
          fi

          auto_merge="$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json autoMergeRequest -q '.autoMergeRequest.enabledAt // empty')"
          if [ -n "${auto_merge}" ]; then
            echo "Auto-merge already enabled on PR #${PR_NUMBER}."
            exit 0
          fi

          echo "Enabling squash auto-merge on PR #${PR_NUMBER} (${head_ref})."
          gh pr merge "${PR_NUMBER}" --repo "${REPOSITORY}" --auto --squash
