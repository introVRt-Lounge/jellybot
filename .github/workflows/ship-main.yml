name: Ship main

# GITHUB_TOKEN / auto-merge merges do not emit push or pull_request workflow events.
# pr-automerge.yml dispatches this workflow after merge; push covers human merges.
on:
  pull_request:
    types: [closed]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: read

concurrency:
  group: ship-main-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ship:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Create GitHub release for releasable commits
        id: release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
        run: bash ./scripts/create-release-if-needed.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=${{ steps.release.outputs.tag }},enable=${{ steps.release.outputs.created == 'true' }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.release.outputs.tag || 'main' }}
            GIT_SHA=${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
