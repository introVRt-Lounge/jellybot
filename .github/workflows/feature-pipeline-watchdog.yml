name: Feature pipeline watchdog

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  issues:
    types:
      - labeled
  pull_request:
    types:
      - opened
      - synchronize
      - closed

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  inspect:
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(fromJSON('["discord-triage-blessed","ai-triage-enqueued","ai-safe","ai-triage"]'), github.event.label.name)) ||
      (github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'ai-triage/fix-issue-'))
    runs-on: ubuntu-latest

    env:
      REPOSITORY: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v6

      - name: Update pipeline status comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash ./scripts/feature-pipeline-watchdog.sh
