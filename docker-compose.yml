services:
  jellybot:
    profiles: [app]
    build:
      context: .
      target: runtime
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_SHA: ${GIT_SHA:-local}
    container_name: jellybot
    restart: unless-stopped
    env_file: .env
    environment:
      JELLYFIN_URL: http://jellyfin:8096
      HEALTH_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - jellybot-tmp:/tmp/jellybot
    networks:
      - traefik_net

  jellybot-tests:
    build:
      context: .
      target: test
    profiles: [test]

  jellybot-register-commands:
    build:
      context: .
      target: runtime
    profiles: [register]
    env_file: .env
    command: ["bun", "run", "src/register-commands.ts"]

networks:
  traefik_net:
    external: true

volumes:
  jellybot-tmp:
