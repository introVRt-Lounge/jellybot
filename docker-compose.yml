services:
  jellybot:
    profiles: [app]
    build:
      context: .
      target: runtime
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_SHA: ${GIT_SHA:-local}
    container_name: jellybot
    restart: unless-stopped
    env_file: .env
    environment:
      JELLYFIN_URL: http://jellyfin:8096
      HEALTH_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      # Clips: expendable storage (default desktop 1tb_smb). Deleted after Discord upload.
      - ${JELLYBOT_CLIP_DIR:-/mnt/drives/1tb_smb/jellybot-clips}:/tmp/jellybot/clips
      # SQLite subtitle index: local Docker volume on main drive. Never bind-mount SMB here.
      - jellybot-data:/tmp/jellybot/data
    networks:
      - traefik_net

  jellybot-tests:
    build:
      context: .
      target: test
    profiles: [test]

  jellybot-register-commands:
    build:
      context: .
      target: runtime
    profiles: [register]
    env_file: .env
    command: ["bun", "run", "src/register-commands.ts"]

  jellybot-index-subtitles:
    build:
      context: .
      target: runtime
    profiles: [index]
    env_file: .env
    environment:
      JELLYFIN_URL: http://jellyfin:8096
    volumes:
      # Clips: expendable storage (default desktop 1tb_smb). Deleted after Discord upload.
      - ${JELLYBOT_CLIP_DIR:-/mnt/drives/1tb_smb/jellybot-clips}:/tmp/jellybot/clips
      # SQLite subtitle index: local Docker volume on main drive. Never bind-mount SMB here.
      - jellybot-data:/tmp/jellybot/data
    networks:
      - traefik_net
    command: ["bun", "run", "src/cli/index-subtitles.ts"]

networks:
  traefik_net:
    external: true

volumes:
  jellybot-data:
