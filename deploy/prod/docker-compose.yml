services:
  jellybot:
    image: ${JELLYBOT_IMAGE:-ghcr.io/introvrt-lounge/jellybot:latest}
    container_name: jellybot
    restart: unless-stopped
    env_file: .env
    environment:
      HEALTH_PORT: 8080
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    volumes:
      - jellybot-clips:/var/lib/jellybot/clips
      - jellybot-data:/var/lib/jellybot/data

volumes:
  jellybot-data:
  jellybot-clips:
