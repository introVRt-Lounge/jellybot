services:
  jellybot:
    image: ghcr.io/heavygee/jellybot:latest
    container_name: jellybot
    restart: unless-stopped
    env_file: .env
    environment:
      JELLYFIN_URL: http://jellyfin:8096
      HEALTH_PORT: 8080
    volumes:
      # Ephemeral clip renders only - expendable SMB/desktop storage
      - ${JELLYBOT_CLIP_DIR:-/mnt/drives/1tb_smb/jellybot-clips}:/tmp/jellybot/clips
      # SQLite subtitle index - local main drive only (never SMB/CIFS)
      - jellybot-data:/tmp/jellybot/data
    networks:
      - traefik_net

networks:
  traefik_net:
    external: true

volumes:
  jellybot-data:
