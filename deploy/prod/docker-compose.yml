services:
  jellybot:
    image: ghcr.io/heavygee/jellybot:latest
    container_name: jellybot
    restart: unless-stopped
    env_file: .env
    environment:
      JELLYFIN_URL: http://jellyfin:8096
      HEALTH_PORT: 8080
    volumes:
      - jellybot-tmp:/tmp/jellybot
    networks:
      - traefik_net

networks:
  traefik_net:
    external: true

volumes:
  jellybot-tmp:
